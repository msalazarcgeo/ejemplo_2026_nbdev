name: CI
on:
  - workflow_dispatch
  - pull_request
  - push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Test with nbdev
        shell: bash
        run: |
            set -ux
            python -m pip install --upgrade pip
            pip install -U "nbdev>=3"
            nbdev-export
            if [ ! $SKIP_TEST ]; then
            nbdev_test --flags "$FLAGS"
            fi
 
 
